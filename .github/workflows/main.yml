name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/
          cp icon-192.png www/
          cp icon-512.png www/

      - name: Install Capacitor
        run: |
          npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5

      - name: Init Capacitor
        run: |
          npx cap init "Lens Tarjimon" "com.usmonjonov.lenstarjimon" --web-dir www

      - name: Add Android
        run: npx cap add android

      - name: Copy assets
        run: npx cap copy android

      - name: Set Java compatibility
        run: |
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' android/app/build.gradle || true
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' android/build.gradle || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Lens-Tarjimon-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
